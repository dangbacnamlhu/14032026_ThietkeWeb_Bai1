<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup là gì? Sử dụng thế nào?</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="top-nav">
            <ul>
                <li><a href="#">TẠO DÁNG</a></li>
                <li><a href="#">ĐỒ HỌA</a></li>
                <li><a href="#">NỘI THẤT</a></li>
                <li><a href="#">KIẾN TRÚC</a></li>
                <li><a href="#">NHIẾP ẢNH</a></li>
                <li><a href="#">NGHỆ THUẬT</a></li>
                <li><a href="#">CUỘC THI</a></li>
                <li><a href="#">NHÂN VẬT</a></li>
                <li><a href="#">SỰ KIỆN</a></li>
                <li><a href="#">O.O.DESIGNS</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-wrap">
        <div class="content-layout">
            <main class="article-card">
                <p class="breadcrumb">o.o.designs > wiki.designs.vn</p>

                <article id="article-content">
                    <h1>Đang tải dữ liệu...</h1>
                </article>
            </main>

            <aside class="sidebar">
                <img src="Images/mm-web-upgrade1.jpg" alt="The Space Builder">
                <img src="Images/certificate-on-wall.jpg" alt="A Design Award">
                <img src="Images/g-mark_award_(2).jpg" alt="Good Design Award">
                <img src="Images/red-dot_award.jpg" alt="Red Dot Design Award">
            </aside>
        </div>
    </div>

    <script>
        function buildArticleHtml(rawText) {
            const lines = rawText
                .split(/\r?\n/)
                .map(line => line.trim());

            const nonEmpty = lines.filter(line => line !== "");

            const title = nonEmpty[0] || "";
            const metaRaw = nonEmpty[1] || "";
            const intro = nonEmpty[2] || "";
            const sectionTitle = nonEmpty[3] || "";
            const bodyParagraphs = [];
            let sourceLink = "";

            for (let i = 4; i < nonEmpty.length; i++) {
                const line = nonEmpty[i];

                if (/^https?:\/\//i.test(line)) {
                    sourceLink = line;
                    continue;
                }

                if (/^mockup là gì\?$/i.test(line) || /^mẫu mockup nhãn sản phẩm\.$/i.test(line)) {
                    continue;
                }

                bodyParagraphs.push(line);
            }

            const metaMatch = metaRaw.match(/^(.*?\d{4})(\d+)(\d+)$/);
            const dateText = metaMatch ? metaMatch[1] : metaRaw;
            const likeCount = metaMatch ? metaMatch[2] : "71";
            const viewCount = metaMatch ? metaMatch[3] : "317";

            return `
                <h1>${title}</h1>

                <div class="meta-row">
                    <span class="date">${dateText}</span>
                    <button class="like-btn" type="button">👍 Like <span>${likeCount}</span></button>
                    <span class="views">👁 ${viewCount}</span>
                </div>

                <p class="lead"><strong>${intro}</strong></p>

                <h2>${sectionTitle}</h2>

                <p>${bodyParagraphs[0] || ""}</p>

                <img class="article-image" src="Images/mockup-la-gi33.jpg" alt="Mockup là gì">

                <p class="caption">Mẫu mockup nhãn sản phẩm.</p>

                <p>${bodyParagraphs[1] || ""}</p>

                <p class="source-link">
                    <a href="${sourceLink}" target="_blank">${sourceLink}</a>
                </p>
            `;
        }

        fetch("data.txt")
            .then(response => response.text())
            .then(text => {
                document.getElementById("article-content").innerHTML = buildArticleHtml(text);
            })
            .catch(() => {
                document.getElementById("article-content").innerHTML = `
                    <h1>Không thể tải dữ liệu</h1>
                    <p>Vui lòng mở trang bằng web server để ` + "`fetch('data.txt')`" + ` hoạt động đúng.</p>
                `;
            });
    </script>
</body>
</html>
